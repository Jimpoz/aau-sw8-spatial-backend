services:
  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:8000
      - ASSISTANT_URL=http://assistant:8001
      - IMAGE_PIPELINE_URL=http://image_pipeline:8002
      - ML_VISION_URL=${ML_VISION_URL:-http://ml_vision:8000}
      - MIDDLEWARE_DEBUG_UPSTREAMS=${MIDDLEWARE_DEBUG_UPSTREAMS:-false}
      - API_SECRET=${API_SECRET}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-}
      - AUTH_JWT_ISSUER=${AUTH_JWT_ISSUER:-ariadne-backend}
    depends_on:
      - backend
      - assistant
      - image_pipeline
      - ml_vision

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - ASSISTANT_URL=http://assistant:8001
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - SUPABASE_ENABLE_SYNC=${SUPABASE_ENABLE_SYNC:-false}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-}
      - AUTH_JWT_ISSUER=${AUTH_JWT_ISSUER:-ariadne-backend}
      - AUTH_JWT_TTL_SECONDS=${AUTH_JWT_TTL_SECONDS:-43200}
      - AUTH_RLS_ENABLED=${AUTH_RLS_ENABLED:-false}
      - AUTH_LOGIN_RATE_LIMIT=${AUTH_LOGIN_RATE_LIMIT:-10}
      - AUTH_MFA_CHALLENGE_TTL_SECONDS=${AUTH_MFA_CHALLENGE_TTL_SECONDS:-300}
      - EMAIL_SERVICE_URL=${EMAIL_SERVICE_URL:-http://email:8003}
      - INTERNAL_EMAIL_TOKEN=${INTERNAL_EMAIL_TOKEN:-}
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    depends_on:
      - assistant
      - email

  assistant:
    build:
      context: ./assistant
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - HF_TOKEN=${HF_TOKEN}
      - ASSISTANT_MODE=${ASSISTANT_MODE}
    volumes:
      - ./assistant:/app

  image_pipeline:
    build:
      context: ./image_pipeline
      dockerfile: Dockerfile
    expose:
      - "8002"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - ./image_pipeline:/app
      - ./shared:/app/shared

  ml_vision:
    build:
      context: ../aau-sw8-ml-vision
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - FACILITY_ID=${ML_VISION_FACILITY_ID:-default_facility}
      - MODEL_ONNX_URL=${ML_VISION_MODEL_ONNX_URL:-https://huggingface.co/zwh20081/yolo26-onnx/resolve/main/yolo26n.onnx}
      - MODEL_DIR=/app/models
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}

  email:
    build:
      context: ./email-service
      dockerfile: Dockerfile
    expose:
      - "8003"
    environment:
      - INTERNAL_EMAIL_TOKEN=${INTERNAL_EMAIL_TOKEN}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-no-reply@ariadne.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Ariadne}
      - MAILBOX_DIR=${MAILBOX_DIR:-}
    volumes:
      # Dummy-mode mailbox: captured .eml files land here. Created on
      # demand; safe to leave mounted whether or not MAILBOX_DIR is set.
      - ./email-mailbox:/mailbox

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - API_SECRET=${API_SECRET}
    depends_on:
      - middleware
