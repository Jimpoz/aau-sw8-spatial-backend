version: "3.9"

services:
  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:8000
      - ASSISTANT_URL=http://assistant:8001
      - IMAGE_PIPELINE_URL=http://image_pipeline:8002
      - MIDDLEWARE_DEBUG_UPSTREAMS=${MIDDLEWARE_DEBUG_UPSTREAMS:-false}
    depends_on:
      - backend
      - assistant
      - image_pipeline

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - ASSISTANT_URL=http://assistant:8001
    networks:
      - default
      - aau_sw8_neo4j
    volumes:
      - ./backend:/app

  assistant:
    build:
      context: ./assistant
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - HF_TOKEN=${HF_TOKEN}
      - ASSISTANT_MODE=${ASSISTANT_MODE:-offline}
    networks:
      - default
      - aau_sw8_neo4j
    volumes:
      - ./assistant:/app

  image_pipeline:
    build:
      context: ./image_pipeline
      dockerfile: Dockerfile
    expose:
      - "8002"
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    networks:
      - default
      - aau_sw8_neo4j
    volumes:
      - ./image_pipeline:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - middleware

networks:
  aau_sw8_neo4j:
    external: true
    name: aau-sw8-indoor-data-pipeline_default
