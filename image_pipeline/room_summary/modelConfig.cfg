[selection]
active = nano

# Official Ultralytics YOLO11 detection profiles.
# Docker predownload uses [selection] active by default.
# Missing files are also downloaded automatically on first use.
# You can also prefetch one manually with:
# python -m room_summary.download_model --config modelConfig.cfg
#
# Available profiles:
# nano
# small
# medium
# large
# xlarge
[nano]
path = models/yolo11n.pt
classes = classConf.cfg
confidence = 0.5

[small]
path = models/yolo11s.pt
classes = classConf.cfg
confidence = 0.5

[medium]
path = models/yolo11m.pt
classes = classConf.cfg
confidence = 0.5

[large]
path = models/yolo11l.pt
classes = classConf.cfg
confidence = 0.5

[xlarge]
path = models/yolo11x.pt
classes = classConf.cfg
confidence = 0.5
